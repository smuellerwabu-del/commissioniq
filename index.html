<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommissionIQ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=Instrument+Sans:wght@400;500;600&family=Instrument+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F7F5F0;--paper:#FDFCFA;--paper2:#F2EFE8;
  --slate:#1C2B3A;--slate2:#2D4255;--slate3:#3D5A72;
  --ink:#1A1F2E;--ink2:#4A5568;--ink3:#8896A8;
  --rule:#DDD8CE;--rule2:#C8C2B4;
  --amber:#C17B2F;--amber-bg:#FDF3E3;
  --red:#B84040;--red-bg:#FDF0F0;
  --green:#2D7A5E;--green-bg:#EDF7F3;
  --blue:#2A5FA5;--blue-bg:#EDF3FC;
  --fh:'Fraunces',Georgia,serif;--fb:'Instrument Sans',system-ui,sans-serif;--fm:'Instrument Mono',monospace;
  --sh:0 1px 3px rgba(28,43,58,.08),0 4px 16px rgba(28,43,58,.06);
  --sh2:0 2px 8px rgba(28,43,58,.1),0 16px 48px rgba(28,43,58,.12);
}
html,body{height:100%;background:var(--cream);color:var(--ink);font-family:var(--fb);font-size:14px;line-height:1.6}
#root{height:100%}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--paper2)}
::-webkit-scrollbar-thumb{background:var(--rule2);border-radius:3px}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cream)}
.login-bg{position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(44,95,165,.06),transparent 50%),radial-gradient(circle at 70% 80%,rgba(193,123,47,.05),transparent 50%);pointer-events:none}
.login-card{position:relative;z-index:1;background:var(--paper);border:1px solid var(--rule);border-radius:16px;padding:52px;width:440px;box-shadow:var(--sh2);animation:fadeUp .4s ease}
.login-logo{font-family:var(--fh);font-size:26px;font-weight:400;letter-spacing:-.3px}
.login-logo em{font-style:italic;color:var(--slate2)}
.login-badge{display:inline-block;font-family:var(--fm);font-size:9px;padding:2px 6px;background:var(--slate);color:#fff;border-radius:3px;letter-spacing:.5px;margin-left:8px;vertical-align:middle}
.login-sub{color:var(--ink2);font-size:13px;margin:4px 0 36px}
.setup-banner{background:var(--amber-bg);border:1px solid rgba(193,123,47,.3);border-radius:10px;padding:16px 20px;margin-bottom:24px;font-size:13px;color:var(--amber);line-height:1.6}
.setup-banner strong{display:block;font-weight:600;margin-bottom:4px}
.setup-banner code{background:rgba(193,123,47,.12);padding:1px 5px;border-radius:3px;font-family:var(--fm);font-size:11px}

.shell{display:flex;height:100vh;overflow:hidden;background:var(--cream)}
.sidebar{width:236px;flex-shrink:0;background:var(--slate);display:flex;flex-direction:column;overflow-y:auto}
.sb-head{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{font-family:var(--fh);font-size:20px;font-weight:400;color:#fff;letter-spacing:-.3px}
.sb-logo em{font-style:italic;opacity:.6}
.sb-tag{font-size:10px;color:rgba(255,255,255,.35);margin-top:3px;font-family:var(--fm);letter-spacing:.5px}
.sb-sec{font-size:9px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,.28);padding:18px 24px 5px;text-transform:uppercase;font-family:var(--fm)}
.sb-item{display:flex;align-items:center;gap:11px;padding:9px 24px;cursor:pointer;color:rgba(255,255,255,.5);font-size:13.5px;transition:all .15s;border-left:2px solid transparent}
.sb-item:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.05)}
.sb-item.active{color:#fff;border-left-color:rgba(255,255,255,.45);background:rgba(255,255,255,.08)}
.sb-chip{margin:4px 20px;padding:6px 10px;border:1px solid rgba(255,255,255,.1);border-radius:6px;display:flex;align-items:center;gap:7px;font-family:var(--fm);font-size:10px;color:rgba(255,255,255,.42)}
.sb-dot{width:5px;height:5px;border-radius:50%;background:#4ADE80;flex-shrink:0}
.sb-foot{margin-top:auto;border-top:1px solid rgba(255,255,255,.08);padding:10px 0}
.user-row{padding:10px 24px;display:flex;align-items:center;gap:10px}
.u-av{width:30px;height:30px;background:rgba(255,255,255,.14);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.u-name{font-size:12px;color:rgba(255,255,255,.65);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.u-role{font-size:10px;color:rgba(255,255,255,.3);font-family:var(--fm)}

.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--paper);border-bottom:1px solid var(--rule);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.tb-title{font-family:var(--fh);font-size:18px;font-weight:300;letter-spacing:-.2px}
.tb-sub{font-size:11px;color:var(--ink3);font-family:var(--fm);margin-left:12px}
.content{padding:32px;flex:1}

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:1px solid;font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;line-height:1;white-space:nowrap}
.btn-p{background:var(--slate);border-color:var(--slate);color:#fff}
.btn-p:hover{background:var(--slate2)}
.btn-o{background:transparent;border-color:var(--rule2);color:var(--ink2)}
.btn-o:hover{background:var(--paper2);color:var(--ink)}
.btn-g{background:transparent;border-color:transparent;color:var(--ink3)}
.btn-g:hover{background:var(--paper2);color:var(--ink2)}
.btn-d{background:transparent;border-color:rgba(184,64,64,.3);color:var(--red)}
.btn-d:hover{background:var(--red-bg)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}

.field{margin-bottom:18px}
.lbl{font-size:10px;color:var(--ink3);font-weight:600;margin-bottom:6px;display:block;font-family:var(--fm);letter-spacing:.5px;text-transform:uppercase}
.inp{width:100%;padding:9px 12px;background:var(--paper);border:1px solid var(--rule2);border-radius:7px;color:var(--ink);font-family:var(--fb);font-size:14px;transition:border-color .15s;outline:none}
.inp:focus{border-color:var(--slate3);box-shadow:0 0 0 3px rgba(28,43,58,.06)}
.inp::placeholder{color:var(--ink3)}
select.inp{cursor:pointer}

.card{background:var(--paper);border:1px solid var(--rule);border-radius:12px;padding:24px;box-shadow:var(--sh)}
.c-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);font-family:var(--fm);margin-bottom:16px}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat{background:var(--paper);border:1px solid var(--rule);border-radius:12px;padding:20px 22px;box-shadow:var(--sh)}
.stat-n{font-family:var(--fh);font-size:36px;font-weight:300;line-height:1}
.stat-l{font-size:11px;color:var(--ink3);margin-top:4px;font-family:var(--fm)}
.stat.hi{border-color:rgba(44,95,165,.2);background:var(--blue-bg)}
.stat.warn{border-color:rgba(193,123,47,.2);background:var(--amber-bg)}
.stat.ok{border-color:rgba(45,122,94,.2);background:var(--green-bg)}

.level-nav{display:flex;gap:0;margin-bottom:24px;background:var(--paper);border:1px solid var(--rule);border-radius:10px;padding:4px;box-shadow:var(--sh)}
.lp{flex:1;padding:8px 4px;text-align:center;cursor:pointer;border-radius:7px;transition:all .15s;font-family:var(--fm)}
.lp:hover{background:var(--cream)}
.lp.active{background:var(--slate);color:#fff;box-shadow:0 1px 4px rgba(28,43,58,.15)}
.lp-num{font-size:15px;font-family:var(--fh);font-weight:300;display:block;line-height:1.2;color:inherit}
.lp-name{font-size:9px;letter-spacing:.4px;margin-top:1px;display:block;color:var(--ink3)}
.lp.active .lp-name{color:rgba(255,255,255,.65)}
.lp-cnt{font-size:9px;margin-top:2px;display:block;color:var(--ink3);opacity:.8}
.lp.active .lp-cnt{color:rgba(255,255,255,.5)}

.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:4px;font-size:10px;font-weight:600;font-family:var(--fm);letter-spacing:.2px;border:1px solid}
.b-pass,.b-ok,.b-resolved,.b-completed,.b-analyzed{background:var(--green-bg);color:var(--green);border-color:rgba(45,122,94,.2)}
.b-fail,.b-error{background:var(--red-bg);color:var(--red);border-color:rgba(184,64,64,.2)}
.b-pending,.b-na,.b-planned,.b-minor{background:var(--paper2);color:var(--ink3);border-color:var(--rule2)}
.b-inProgress{background:var(--blue-bg);color:var(--blue);border-color:rgba(42,95,165,.2)}
.b-critical{background:var(--red-bg);color:var(--red);border-color:rgba(184,64,64,.2)}
.b-major,.b-warning,.b-open{background:var(--amber-bg);color:var(--amber);border-color:rgba(193,123,47,.2)}
.b-analyzing{background:var(--blue-bg);color:var(--blue);border-color:rgba(42,95,165,.2)}

.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;color:var(--ink3);font-weight:600;font-family:var(--fm);font-size:10px;letter-spacing:.8px;text-transform:uppercase;border-bottom:2px solid var(--rule);white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--rule);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--cream)}
.mo{font-family:var(--fm);font-size:12px;color:var(--ink2)}

.modal-ov{position:fixed;inset:0;background:rgba(26,31,46,.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--paper);border:1px solid var(--rule);border-radius:16px;padding:36px;width:540px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--sh2)}
.modal-title{font-family:var(--fh);font-size:22px;font-weight:300;margin-bottom:24px;letter-spacing:-.2px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:28px;padding-top:20px;border-top:1px solid var(--rule)}

.pb{width:72px;height:3px;background:var(--rule);border-radius:2px;overflow:hidden;flex-shrink:0}
.pf{height:100%;background:var(--slate);border-radius:2px}

.proj-row{display:flex;align-items:center;gap:16px;padding:14px 16px;margin:0 -16px;cursor:pointer;border-bottom:1px solid var(--rule);transition:background .12s}
.proj-row:last-child{border-bottom:none}
.proj-row:hover{background:var(--cream)}
.pid{font-family:var(--fm);font-size:11px;color:var(--ink3);width:90px;flex-shrink:0}
.dds{display:flex;gap:4px;align-items:center}
.dd{width:7px;height:7px;border-radius:50%}

.tabs{display:flex;border-bottom:2px solid var(--rule);margin-bottom:24px}
.tab{padding:10px 20px;cursor:pointer;color:var(--ink3);font-size:13px;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--ink2)}
.tab.active{color:var(--slate);border-bottom-color:var(--slate)}

.rb{display:flex;gap:5px}
.rbtn{padding:4px 9px;border-radius:4px;border:1px solid var(--rule2);cursor:pointer;font-size:10px;font-weight:600;font-family:var(--fm);background:transparent;color:var(--ink3);transition:all .1s;letter-spacing:.3px}
.rbtn.sp{background:var(--green-bg);border-color:rgba(45,122,94,.3);color:var(--green)}
.rbtn.sf{background:var(--red-bg);border-color:rgba(184,64,64,.3);color:var(--red)}
.rbtn.sn,.rbtn.so{background:var(--paper2);color:var(--ink3)}

.df{display:flex;gap:6px;flex-wrap:wrap}
.dbtn{padding:5px 12px;border-radius:20px;border:1px solid var(--rule2);cursor:pointer;font-size:12px;background:var(--paper);color:var(--ink3);transition:all .15s}
.dbtn:hover{color:var(--ink2)}
.dbtn.da{border-color:var(--slate);color:var(--slate);background:var(--cream);font-weight:500}

.lv-head{display:flex;align-items:flex-start;gap:20px;margin-bottom:20px;padding:20px 24px;background:var(--paper);border:1px solid var(--rule);border-radius:12px;box-shadow:var(--sh)}
.lv-num{font-family:var(--fh);font-size:48px;font-weight:300;color:var(--rule2);line-height:1;flex-shrink:0;letter-spacing:-2px;padding-top:2px}
.lv-name{font-family:var(--fh);font-size:20px;font-weight:300;margin-bottom:4px}
.lv-desc{font-size:13px;color:var(--ink2);line-height:1.55}
.lv-stds{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.std-t{font-family:var(--fm);font-size:10px;padding:3px 8px;border:1px solid rgba(44,95,165,.25);border-radius:4px;color:var(--blue);background:var(--blue-bg)}

.drop-z{border:2px dashed var(--rule2);border-radius:12px;padding:44px;text-align:center;cursor:pointer;transition:all .2s;color:var(--ink3)}
.drop-z:hover{border-color:var(--slate3);background:var(--blue-bg);color:var(--slate)}
.doc-card{background:var(--cream);border:1px solid var(--rule);border-radius:10px;padding:16px;margin-bottom:12px}
.doc-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.doc-ext{font-family:var(--fm);font-size:9px;padding:2px 6px;border-radius:3px;background:var(--slate);color:#fff;letter-spacing:.5px;text-transform:uppercase}
.ex-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--rule);font-size:12.5px;flex-wrap:wrap}
.ex-row:last-child{border-bottom:none}
.ex-f{color:var(--ink3);width:150px;flex-shrink:0;font-family:var(--fm);font-size:11px}
.ex-v{font-family:var(--fm);font-size:12px;flex:1;color:var(--ink)}
.ex-c{font-family:var(--fm);font-size:11px;color:var(--ink3);width:36px;text-align:right}

.ai-sp{display:flex;align-items:center;gap:8px;padding:16px;color:var(--ink3);font-size:13px;font-family:var(--fm)}
.ai-d{width:5px;height:5px;border-radius:50%;background:var(--slate3);animation:pulse 1.2s ease-in-out infinite}
.ai-d:nth-child(2){animation-delay:.2s}
.ai-d:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}

.cx-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:10px 14px;background:var(--green-bg);border:1px solid rgba(45,122,94,.15);border-radius:8px;margin-bottom:20px;font-size:11px}
.cx-i{display:flex;align-items:center;gap:5px;color:var(--green);font-family:var(--fm)}

.ar{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--rule);font-size:12.5px}
.ar:last-child{border-bottom:none}
.a-ts{font-family:var(--fm);color:var(--ink3);width:150px;flex-shrink:0;font-size:11px}
.a-u{color:var(--slate);width:180px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.a-a{color:var(--ink2);flex:1}

.sign-box{border:1px solid var(--rule);border-radius:8px;padding:16px;background:var(--cream);margin-top:16px}
.sig-ln{border-top:1px solid var(--rule2);margin:14px 0}
.toast{position:fixed;bottom:28px;right:28px;z-index:999;background:var(--slate);color:#fff;padding:13px 20px;border-radius:10px;font-size:13px;box-shadow:var(--sh2)}
.toast-err{background:var(--red);color:#fff}

.chk-grp{display:flex;flex-wrap:wrap;gap:8px}
.chk-i{display:flex;align-items:center;gap:7px;padding:7px 14px;border:1px solid var(--rule2);border-radius:7px;cursor:pointer;font-size:13px;transition:all .15s;background:var(--paper)}
.chk-i.ck{border-color:var(--slate);background:var(--cream);color:var(--slate);font-weight:500}
.empty{text-align:center;padding:44px 20px;color:var(--ink3)}
.empty-i{font-size:28px;margin-bottom:10px;opacity:.35}
hr.dv{border:none;border-top:1px solid var(--rule);margin:20px 0}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.st{font-family:var(--fh);font-size:22px;font-weight:300;letter-spacing:-.2px}
.err{color:var(--red);font-size:12px;margin-bottom:14px;padding:9px 12px;background:var(--red-bg);border-radius:7px;border:1px solid rgba(184,64,64,.2)}
.mfa-i{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:12px 16px;background:var(--blue-bg);border-radius:8px;border:1px solid rgba(42,95,165,.15)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.loading-screen{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--ink3)}
.spin{width:28px;height:28px;border:2px solid var(--rule2);border-top-color:var(--slate);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}

/* ── ROLES & APPROVALS ── */
.role-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;font-family:var(--fm);letter-spacing:.2px}
.role-Admin{background:#EDF3FC;color:var(--blue);border:1px solid rgba(42,95,165,.2)}
.role-Engineer{background:var(--green-bg);color:var(--green);border:1px solid rgba(45,122,94,.2)}
.role-Viewer{background:var(--paper2);color:var(--ink3);border:1px solid var(--rule2)}
.role-CxA{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(193,123,47,.2)}
.role-Owner-Rep{background:#EDF3FC;color:var(--blue);border:1px solid rgba(42,95,165,.2)}
.approval-card{background:var(--paper);border:1px solid var(--rule);border-radius:10px;padding:16px;margin-bottom:10px;box-shadow:var(--sh)}
.approval-pending{border-left:3px solid var(--amber)}
.approval-approved{border-left:3px solid var(--green)}
.approval-rejected{border-left:3px solid var(--red)}
.appr-status{font-family:var(--fm);font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.appr-pending{color:var(--amber)}
.appr-approved{color:var(--green)}
.appr-rejected{color:var(--red)}
.member-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--rule)}
.member-row:last-child{border-bottom:none}
.member-av{width:28px;height:28px;border-radius:50%;background:var(--slate);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.notify-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;font-size:11px;background:var(--blue-bg);color:var(--blue);border:1px solid rgba(42,95,165,.2);font-family:var(--fm)}
.tab-section{background:var(--paper);border:1px solid var(--rule);border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:var(--sh)}
.tab-sec-title{font-family:var(--fh);font-size:15px;font-weight:300;letter-spacing:-.1px;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.tab-sec-sub{font-size:12px;color:var(--ink3);margin-bottom:16px;font-family:var(--fm)}
.tab-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-bottom:10px}
.tab-row{display:grid;gap:0;border:1px solid var(--rule);border-radius:7px;overflow:hidden;font-size:12.5px}
.tab-row-head{display:grid;background:var(--slate);color:#fff;font-family:var(--fm);font-size:9px;letter-spacing:.6px;text-transform:uppercase;font-weight:600}
.tab-cell{padding:7px 10px;border-bottom:1px solid var(--rule)}
.tab-cell:last-child{border-bottom:none}
.tab-inp{width:100%;padding:4px 7px;background:var(--paper);border:1px solid var(--rule2);border-radius:5px;color:var(--ink);font-family:var(--fm);font-size:12px;outline:none;transition:border-color .15s}
.tab-inp:focus{border-color:var(--slate3)}
.tab-inp.pass{background:var(--green-bg);border-color:rgba(45,122,94,.3);color:var(--green)}
.tab-inp.fail{background:var(--red-bg);border-color:rgba(184,64,64,.3);color:var(--red)}

// ── SUPABASE DATA LAYER ───────────────────────────────────────────────────────
const DB = {
  // Projects
  async getProjects(userId) {
    if(!sb) return [];
    const {data,error} = await sb.from('projects').select('*').order('created_at',{ascending:false});
    if(error) throw error;
    return data||[];
  },
  async createProject(proj,userId) {
    if(!sb) throw new Error('Not configured');
    const {data,error} = await sb.from('projects').insert({
      name:proj.name, client:proj.client, location:proj.location,
      start_date:proj.startDate, uptime_tier:proj.tier,
      disciplines:proj.disciplines, status:'planned',
      redundancy_strategy:proj.redundancyStrategy||'',
      it_load_kw:proj.itLoadKw||null, design_pue:proj.designPue||null,

      opr_document:'', bod_document:'', spof_reviewed:false,
      owner_id:userId,
    }).select().single();
    if(error) throw error;
    await DB.audit(data.id,userId,'project.created','project',data.id,{name:proj.name});
    return data;
  },
  async updateProject(id,updates) {
    if(!sb) return;
    const {error} = await sb.from('projects').update({...updates,updated_at:new Date().toISOString()}).eq('id',id);

  async getTests(projectId) {

    const {data,error} = await sb.from('tests').select('*').eq('project_id',projectId).order('tested_at',{ascending:true});

    if(!sb) throw new Error('Not configured');
    const {data,error} = await sb.from('tests').insert({
      project_id:projectId, test_number:test.id, cx_level:test.level,
      discipline:test.discipline, equipment_id:test.equipment||'',
      description:test.description, expected_value:test.expected,
      measured_value:test.measured||'PENDING', result:test.result||'pending',

      level_data:test.levelData||{}, is_locked:false, created_by_id:userId,

    if(error) throw error;
    await DB.audit(projectId,userId,'test.created','test',data.id,{test_number:test.id,result:test.result});

  async updateTest(id,updates,userId,projectId) {
    if(!sb) return;
    const {error} = await sb.from('tests').update({
      measured_value:updates.measured, result:updates.result,
      observations:updates.notes, updated_at:new Date().toISOString()

    if(!sb) throw new Error('Not configured');
    const lockedAt = new Date().toISOString();
    const {data,error} = await sb.from('tests').update({
      is_locked:true,
      locked_at:lockedAt,
      locked_by_id:userId,
      signature_name:signatureName,
      witness_signature:witnessSignature||null,
      witness_signed_at:witnessSignature?lockedAt:null,
    }).eq('id',id).eq('is_locked',false).select().single();
    if(error) throw error;
    await DB.audit(projectId,userId,'test.locked','test',id,{
      signature_name:signatureName,
      witness_signature:witnessSignature||null,
      locked_at:lockedAt,

    return (data||[]).map(d=>({...d,extractedValues:d.extracted_values||[],summary:d.ai_summary}));

  async uploadDocument(file,projectId,userId) {
    if(!sb) throw new Error('Not configured');
    const ext=file.name.split('.').pop().toLowerCase();
    const key=`${projectId}/${uid()}-${file.name}`;
    // Upload to Supabase Storage
    const {error:uploadErr} = await sb.storage.from('documents').upload(key,file,{cacheControl:'3600',upsert:false});
    if(uploadErr) throw uploadErr;
    const type=['pdf'].includes(ext)?'pdf':['xlsx','csv'].includes(ext)?'xlsx':['docx','doc'].includes(ext)?'docx':'other';
    const {data,error} = await sb.from('documents').insert({
      project_id:projectId, file_name:file.name, file_type:type,
      s3_key:key, file_size_bytes:file.size, status:'analyzing',
      uploaded_by_id:userId,

    if(error) throw error;
    await DB.audit(projectId,userId,'document.uploaded','document',data.id,{file_name:file.name});
    return data;

  async uploadTestPhoto(file, projectId, testDbId, userId) {
    if(!sb) throw new Error('Not configured');
    const ext = file.name.split('.').pop().toLowerCase();
    const key = `${projectId}/photos/${testDbId}/${uid()}.${ext}`;
    const { error: upErr } = await sb.storage.from('documents').upload(key, file, {
      cacheControl: '3600', upsert: false, contentType: file.type
    });
    if(upErr) throw upErr;
    const { data: urlData } = sb.storage.from('documents').getPublicUrl(key);
    // Store photo reference in test level_data
    const { data: test } = await sb.from('tests').select('level_data').eq('id', testDbId).single();
    const existing = test?.level_data || {};
    const photos = [...(existing.photos || []), { key, url: urlData.publicUrl, name: file.name, uploadedAt: new Date().toISOString() }];
    await sb.from('tests').update({ level_data: { ...existing, photos } }).eq('id', testDbId);
    await DB.audit(projectId, userId, 'test.photo_added', 'test', testDbId, { file_name: file.name });
    return { key, url: urlData.publicUrl };
  },

  async deleteTestPhoto(testDbId, photoKey, projectId, userId) {
    if(!sb) return;
    await sb.storage.from('documents').remove([photoKey]);
    const { data: test } = await sb.from('tests').select('level_data').eq('id', testDbId).single();
    const existing = test?.level_data || {};
    const photos = (existing.photos || []).filter(p => p.key !== photoKey);
    await sb.from('tests').update({ level_data: { ...existing, photos } }).eq('id', testDbId);
    await DB.audit(projectId, userId, 'test.photo_removed', 'test', testDbId, { key: photoKey });
  },

    if(!sb) return;
    try {

        project_id:projectId, user_id:userId, action,

    } catch(e){ console.warn('Audit log failed:',e); }
  },

  async notify(type, payload) {
    if(!sb||!IS_CONFIGURED) return;
    try {
      await sb.functions.invoke('commissioniq-notify', { body: { type, ...payload } });
    } catch(e) { console.warn('Notification failed (non-critical):', e); }

  // ── APPROVAL WORKFLOW ─────────────────────────────────────────────────────
  async getApprovals(projectId) {
    if(!sb) return [];
    const {data,error} = await sb.from('approvals').select('*').eq('project_id',projectId).order('created_at',{ascending:false});
    if(error) return [];
    return data||[];

  async createApproval(projectId,userId,userEmail,cx_level,note) {
    if(!sb) throw new Error('Not configured');
    const {data,error} = await sb.from('approvals').insert({
      project_id:projectId, requested_by:userId, requested_by_email:userEmail,
      cx_level, note:note||'', status:'pending',
    }).select().single();
    if(error) throw error;
    await DB.audit(projectId,userId,'approval.requested','project',projectId,{cx_level,note});
    await DB.notify('approval_requested',{projectId,requestedBy:userEmail,cx_level,note});
    return data;
  },
  async respondApproval(approvalId,decision,responderEmail,projectId,userId) {
    if(!sb) throw new Error('Not configured');
    const {data,error} = await sb.from('approvals').update({
      status:decision, responded_by_email:responderEmail,
      responded_at:new Date().toISOString(),
    }).eq('id',approvalId).select().single();
    if(error) throw error;
    await DB.audit(projectId,userId,`approval.${decision}`,'project',projectId,{decision,responder:responderEmail});
    await DB.notify('approval_responded',{projectId,decision,responderEmail});
    return data;
  },

  // ── PROJECT MEMBERS (for role enforcement) ────────────────────────────────
  async getMembers(projectId) {
    if(!sb) return [];
    const {data,error} = await sb.from('project_members').select('*').eq('project_id',projectId);
    if(error) return [];
    return data||[];
  },
  async addMember(projectId,email,role,addedById) {
    if(!sb) throw new Error('Not configured');
    // First look up user id from auth.users via public.users table
    const {data:u} = await sb.from('users').select('id').eq('email',email).single();
    if(!u) throw new Error(`User ${email} not found. They must sign in at least once first.`);
    const {data,error} = await sb.from('project_members').upsert({
      project_id:projectId, user_id:u.id, role
    }).select().single();
    if(error) throw error;
    await DB.audit(projectId,addedById,'member.added','project',projectId,{email,role});
    await DB.notify('member_added',{projectId,email,role});
    return data;
  },
  async removeMember(projectId,userId,removedById) {
    if(!sb) return;
    await sb.from('project_members').delete().eq('project_id',projectId).eq('user_id',userId);
    await DB.audit(projectId,removedById,'member.removed','project',projectId,{userId});
  },

  // ── COMPANY SETTINGS (localStorage – no server needed) ───────────────────
  getCompany() {
    try { return JSON.parse(localStorage.getItem('ciq_company')||'{}'); } catch{ return {}; }
  },
  saveCompany(data) {
    try { localStorage.setItem('ciq_company', JSON.stringify(data)); return true; } catch{ return false; }
  },
};

// ── AI ANALYSIS ───────────────────────────────────────────────────────────────
// Routed through Supabase Edge Function – Anthropic API key never touches the browser
async function analyzeDoc(fileName, fileType, lang) {
  if(!sb) throw new Error('Not configured');

  // Call our secure Edge Function – it holds the Anthropic key server-side
  const { data, error } = await sb.functions.invoke('commissioniq-analyze', {
    body: { fileName, fileType, lang }
  });

  if(error) throw error;
  return data; // { extractedValues: [...], summary: "..." }
}

      Until configured, the app runs in demo mode with local data only.
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({onLogin,t,lang,setLang}){
  const [step,setStep]=useState("creds");
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [mfa,setMfa]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);

  async function go(e){
    e.preventDefault();setErr("");setBusy(true);
    if(!IS_CONFIGURED){
      // Demo mode: accept any credentials
      setTimeout(()=>{onLogin({id:'demo',email:email||'demo@commissioniq.com',role:'Admin'});},400);
      return;
    }
    try{
      const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
      if(error) throw error;
      // If TOTP is required, Supabase returns a challenge
      if(data.session){
        onLogin({id:data.user.id,email:data.user.email,role:'Admin'});
      } else {
        setStep("mfa");
      }
    }catch(e){setErr(t.invalidLogin);}
    setBusy(false);
  }

  async function goMfa(e){
    e.preventDefault();setBusy(true);
    try{
      const {data,error}=await sb.auth.verifyOtp({email,token:mfa,type:'totp'});
      if(error) throw error;
      onLogin({id:data.user.id,email:data.user.email,role:'Admin'});
    }catch(e){setErr("Invalid code — check your authenticator app.");}
    setBusy(false);
  }

  return(
    <div className="login-wrap">
      <div className="login-bg"/>
      <div className="login-card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
          <div>
            <div><span className="login-logo">Commission<em>IQ</em></span><span className="login-badge">USA</span></div>
            <div className="login-sub">{t.appSub}</div>
          </div>
          <button className="btn btn-g btn-sm" onClick={()=>setLang(l=>l==="en"?"de":"en")}>{t.lang}</button>
        </div>
        {!IS_CONFIGURED&&<SetupBanner/>}
        {step==="creds"
          ?<form onSubmit={go}>
            <div className="field"><label className="lbl">{t.email}</label>
              <input className="inp" type="email" value={email} onChange={e=>setEmail(e.target.value)} autoFocus placeholder={IS_CONFIGURED?"":"demo@commissioniq.com"}/></div>
            <div className="field"><label className="lbl">{t.password}</label>
              <input className="inp" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder={IS_CONFIGURED?"":"any password"}/></div>
            {err&&<div className="err">{err}</div>}
            <button className="btn btn-p" type="submit" disabled={busy} style={{width:"100%",justifyContent:"center"}}>
              {busy?"…":t.loginBtn}</button>
            {IS_CONFIGURED&&<div style={{marginTop:12,fontSize:11,color:"var(--ink3)",textAlign:"center"}}>
              Forgot password? Use the link sent to your email after account creation.
            </div>}
          </form>
          :<form onSubmit={goMfa}>
            <div className="mfa-i"><span style={{fontSize:22}}>🔐</span>
              <div><div style={{fontWeight:600,fontSize:13}}>Two-Factor Authentication</div>
                <div style={{fontSize:12,color:"var(--ink2)",marginTop:2}}>{t.mfaHint}</div></div>
            </div>
            <div className="field"><label className="lbl">Code</label>
              <input className="inp" style={{fontFamily:"var(--fm)",fontSize:24,letterSpacing:10,textAlign:"center"}}
                type="text" maxLength={6} placeholder="000000" value={mfa}
                onChange={e=>setMfa(e.target.value.replace(/\D/g,""))} autoFocus/></div>
            {err&&<div className="err">{err}</div>}
            <button className="btn btn-p" type="submit" disabled={busy||mfa.length<6} style={{width:"100%",justifyContent:"center"}}>{busy?"…":t.mfaBtn}</button>
            <button type="button" className="btn btn-g" style={{width:"100%",justifyContent:"center",marginTop:8}} onClick={()=>{setStep("creds");setErr("");setMfa("");}}>← {t.back}</button>
          </form>
        }
      </div>
    </div>
  );
}

// ── PROJECT HOOKS ─────────────────────────────────────────────────────────────
function useProject(projectId,user){
  const [tests,setTests]=useState([]);
  const [punchItems,setPunchItems]=useState([]);
  const [documents,setDocuments]=useState([]);
  const [auditLog,setAuditLog]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    if(!projectId)return;
    setLoading(true);
    Promise.all([
      DB.getTests(projectId),
      DB.getPunchItems(projectId),
      DB.getDocuments(projectId),
      DB.getAuditLog(projectId),
    ]).then(([t,p,d,a])=>{
      setTests(t);setPunchItems(p);setDocuments(d);setAuditLog(a);
    }).catch(console.error).finally(()=>setLoading(false));
  },[projectId]);

  // Normalize DB row to app format
  function normalizeTest(row){
    return{
      id:row.test_number||row.id, dbId:row.id,
      level:row.cx_level, discipline:row.discipline,
      equipment:row.equipment_id, description:row.description,
      expected:row.expected_value, measured:row.measured_value,
      result:row.result, notes:row.observations,
      technician:row.technician_name, ts:row.tested_at||row.created_at,
      locked:row.is_locked, signature:row.signature_name,
      levelData:row.level_data||{},
      manufacturer:row.level_data?.manufacturer,
      serial:row.level_data?.serial,
      witness:row.level_data?.witness,
      carrier:row.level_data?.carrier,
      condition:row.level_data?.condition,
      storage:row.level_data?.storage,
      scenario:row.level_data?.scenario,
      trigger:row.level_data?.trigger,
    };
  }
  function normalizePunch(row){
    return{id:row.item_number||row.id,dbId:row.id,description:row.description,
      severity:row.severity,assignedTo:row.assigned_to_name,due:row.due_date,status:row.status};
  }

  return {
    tests:tests.map(normalizeTest),
    punchItems:punchItems.map(normalizePunch),
    documents,auditLog,loading,
    refreshAudit:()=>DB.getAuditLog(projectId).then(setAuditLog),
  };
}

function Dashboard({projects,onOpen,onCreate,t}){
  const all=projects.flatMap(p=>p._tests||[]);
  const passed=all.filter(t=>t.result==="pass").length;
  const openP=projects.flatMap(p=>p._punch||[]).filter(i=>i.status==="open").length;
  const docs=projects.flatMap(p=>p._docs||[]).filter(d=>d.status==="analyzed").length;
  return(
    <div>
      <div className="stats-row">
        <div className="stat hi"><div className="stat-n" style={{color:"var(--blue)"}}>{projects.filter(p=>p.status==="inProgress").length}</div><div className="stat-l">{t.totalProjects}</div></div>
        <div className="stat warn"><div className="stat-n" style={{color:"var(--amber)"}}>{openP}</div><div className="stat-l">{t.openItems}</div></div>
        <div className="stat ok"><div className="stat-n" style={{color:"var(--green)"}}>{passed}</div><div className="stat-l">{t.testsPassed}</div></div>
        <div className="stat"><div className="stat-n">{docs}</div><div className="stat-l">{t.docsAnalyzed}</div></div>
      </div>
      {projects.filter(p=>p.status==="inProgress").map(p=>{
        const tests=p._tests||[];
        const punch=p._punch||[];
        return(
          <div key={p.id} className="card" style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div>
                <div style={{fontFamily:"var(--fh)",fontSize:17,fontWeight:300,letterSpacing:"-.2px"}}>{p.name}</div>
                <div style={{fontSize:11,color:"var(--ink3)",fontFamily:"var(--fm)",marginTop:3}}>
                  {p.client} · {p.location} · Uptime Tier {p.uptime_tier||"—"}
                  {p.redundancy_strategy&&<span> · {p.redundancy_strategy}</span>}
                  {p.it_load_kw&&<span> · {p.it_load_kw} kW</span>}
                  {p.design_pue&&<span> · PUE {p.design_pue}</span>}
                </div>
              </div>
              <button className="btn btn-g btn-sm" onClick={()=>onOpen(p.id)}>Open →</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
              {CX_LEVELS.map(lv=>{
                const cnt=tests.filter(t=>t.cx_level===lv.id).length;
                const pass=tests.filter(t=>t.cx_level===lv.id&&t.result==="pass").length;
                const fail=tests.filter(t=>t.cx_level===lv.id&&t.result==="fail").length;
                const color=!cnt?"var(--rule2)":fail>0?"var(--red)":pass===cnt&&cnt>0?"var(--green)":"var(--amber)";
                const bg=!cnt?"var(--cream)":fail>0?"var(--red-bg)":pass===cnt&&cnt>0?"var(--green-bg)":"var(--amber-bg)";
                return(
                  <div key={lv.id} onClick={()=>onOpen(p.id)}
                    style={{textAlign:"center",padding:"10px 4px",background:bg,borderRadius:8,border:`1px solid ${cnt?color+"44":"var(--rule)"}`,cursor:"pointer",transition:"opacity .15s"}}
                    onMouseEnter={e=>e.currentTarget.style.opacity=".7"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                    <div style={{fontFamily:"var(--fm)",fontSize:9,color:cnt?color:"var(--ink3)",marginBottom:3,letterSpacing:".5px"}}>L{lv.id}</div>
                    <div style={{fontFamily:"var(--fh)",fontSize:17,fontWeight:300,color:cnt?color:"var(--rule2)",lineHeight:1}}>{cnt?`${pass}/${cnt}`:"—"}</div>
                    <div style={{fontSize:9,color:cnt?color:"var(--ink3)",marginTop:3,fontFamily:"var(--fm)"}}>{lv.short}</div>
                  </div>
                );
              })}
            </div>
            {punch.filter(i=>i.status==="open").length>0&&(
              <div style={{marginTop:10,padding:"8px 12px",background:"var(--red-bg)",border:"1px solid rgba(184,64,64,.15)",borderRadius:7,fontSize:12,color:"var(--red)",display:"flex",alignItems:"center",gap:8}}>
                <span>⚠</span>
                <span>{punch.filter(i=>i.status==="open").length} open punch item{punch.filter(i=>i.status==="open").length>1?"s":""}</span>
                {punch.filter(i=>i.status==="open"&&i.severity==="critical").length>0&&
                  <span style={{fontWeight:600}}>· {punch.filter(i=>i.status==="open"&&i.severity==="critical").length} critical</span>}
              </div>
            )}
          </div>
        );
      })}
      <div className="card">
        <div className="sh"><div className="c-lbl" style={{marginBottom:0}}>{t.recent}</div>
          <button className="btn btn-p btn-sm" onClick={onCreate}>+ {t.newProject}</button></div>
        <hr className="dv"/>
        {projects.length===0&&<div className="empty"><div className="empty-i">📋</div><p>{t.noProjects}</p></div>}
        {projects.map(p=>{const prog=calcProg(p._tests||[]);return(
          <div key={p.id} className="proj-row" onClick={()=>onOpen(p.id)}>
            <div className="pid">{p.project_number||p.id?.slice(0,8)}</div>
            <div style={{flex:2}}><div style={{fontWeight:500}}>{p.name}</div>
              <div style={{fontSize:12,color:"var(--ink3)",marginTop:1}}>{p.location}</div></div>
            <div style={{flex:1,fontSize:13,color:"var(--ink2)"}}>{p.client}</div>
            {p.uptime_tier&&<span style={{fontFamily:"var(--fm)",fontSize:10,padding:"2px 7px",border:"1px solid var(--rule2)",borderRadius:4,color:"var(--ink3)",flexShrink:0}}>Tier {p.uptime_tier}</span>}
            <div className="dds">{(p.disciplines||[]).map(d=><div key={d} className="dd" style={{background:DC[d]}}/>)}</div>
            <Badge type={p.status} label={t[p.status]||p.status}/>
            <div style={{display:"flex",alignItems:"center",gap:8}}><PBar v={prog}/><span style={{fontSize:11,color:"var(--ink3)",width:30,textAlign:"right"}}>{prog}%</span></div>
          </div>
        );})}
      </div>
    </div>
  );
}

        </div>
        <div className="field"><label className="lbl">{t.disciplines}</label>
          <div className="chk-grp">{DISCS.map(d=><label key={d} className={`chk-i ${discs.includes(d)?"ck":""}`}>
            <input type="checkbox" style={{display:"none"}} checked={discs.includes(d)} onChange={()=>tog(d)}/>{DI[d]} {t[d]}</label>)}</div></div>
        <div className="modal-foot">

        </div>
      </div>
    </div>
  );
}

// ── ADD TEST MODAL ────────────────────────────────────────────────────────────
function AddTestModal({project,onAdd,onClose,t,user,defLevel}){
  const [lv,setLv]=useState(defLevel||4);
  const [disc,setDisc]=useState((project.disciplines||[])[0]||"electrical");
  const [desc,setDesc]=useState("");
  const [equip,setEquip]=useState("");
  const [exp,setExp]=useState("");
  const [meas,setMeas]=useState("");
  const [res,setRes]=useState("pending");
  const [notes,setNotes]=useState("");
  const [ex,setEx]=useState({});
  const [busy,setBusy]=useState(false);
  const [showTpl,setShowTpl]=useState(false);

  // Templates matching current discipline + level
  const matchingTpls = TEST_TEMPLATES.filter(tpl=>tpl.discipline===disc&&tpl.level===lv);
  const anyTpls = TEST_TEMPLATES.filter(tpl=>tpl.discipline===disc);

  function applyTemplate(tpl){
    setDesc(tpl.desc);
    setExp(tpl.expected);
    setNotes(tpl.notes||"");
    if(tpl.levelData) setEx(prev=>({...prev,...tpl.levelData}));
    setShowTpl(false);
  }

  async function submit(){
    setBusy(true);
    const px={electrical:"E",mechanical:"M",fireSuppression:"F",itInfra:"I"}[disc]||"T";
    const lx={0:"D",1:"FAT",2:"DEL",3:"PRE",4:"",5:"IST",6:"HO"}[lv]||"";
    const n=Math.floor(Math.random()*900)+100;
    const testId=`${lx}${px}-${String(n).padStart(3,"0")}`;
    await onAdd({id:testId,level:lv,discipline:disc,equipment:equip,description:desc,
      expected:exp,measured:meas||"PENDING",result:res,notes,
      technician:user.email.split("@")[0],levelData:ex});
    setBusy(false);onClose();
  }

  return(
    <div className="modal-ov">
      <div className="modal" style={{width:580}}>
        <div className="modal-title">{t.addTest}</div>

        {/* Level + Discipline selectors */}
        <div className="g2" style={{marginBottom:0}}>
          <div className="field"><label className="lbl">Level</label>
            <select className="inp" value={lv} onChange={e=>{setLv(Number(e.target.value));setShowTpl(false);}}>
              {CX_LEVELS.map(l=><option key={l.id} value={l.id}>L{l.id} – {l.short}</option>)}
            </select></div>
          <div className="field"><label className="lbl">{t.disciplines}</label>
            <select className="inp" value={disc} onChange={e=>{setDisc(e.target.value);setShowTpl(false);}}>
              {(project.disciplines||DISCS).map(d=><option key={d} value={d}>{DI[d]} {t[d]}</option>)}
            </select></div>
        </div>

        {/* Template picker */}
        {(matchingTpls.length>0||anyTpls.length>0)&&(
          <div style={{marginBottom:16}}>
            <button type="button" className="btn btn-o btn-sm"
              style={{width:"100%",justifyContent:"center",gap:8}}
              onClick={()=>setShowTpl(v=>!v)}>
              <span>📋</span>
              {showTpl?"Hide templates":
                `Use template (${matchingTpls.length} for L${lv} · ${anyTpls.length} total for ${t[disc]||disc})`}
            </button>

            {showTpl&&(
              <div style={{marginTop:8,border:"1px solid var(--rule)",borderRadius:8,overflow:"hidden",maxHeight:260,overflowY:"auto"}}>
                {/* Group by level */}
                {[3,4,5,1,2].map(lvId=>{
                  const grp=TEST_TEMPLATES.filter(tpl=>tpl.discipline===disc&&tpl.level===lvId);
                  if(!grp.length) return null;
                  const lvInfo=CX_LEVELS.find(l=>l.id===lvId);
                  return(
                    <div key={lvId}>
                      <div style={{padding:"6px 12px",background:"var(--paper2)",fontSize:9,fontFamily:"var(--fm)",
                        color:"var(--ink3)",textTransform:"uppercase",letterSpacing:".8px",fontWeight:600,
                        borderBottom:"1px solid var(--rule)",display:"flex",alignItems:"center",gap:8}}>
                        <span style={{background:lvId===lv?"var(--slate)":"var(--rule2)",color:lvId===lv?"#fff":"var(--ink3)",
                          padding:"1px 6px",borderRadius:3,fontSize:9}}>L{lvId}</span>
                        {lvInfo?.name}
                      </div>
                      {grp.map(tpl=>(
                        <div key={tpl.id}
                          onClick={()=>applyTemplate(tpl)}
                          style={{padding:"10px 14px",borderBottom:"1px solid var(--rule)",cursor:"pointer",
                            transition:"background .1s",background:tpl.level===lv?"var(--paper)":"var(--cream)"}}
                          onMouseEnter={e=>e.currentTarget.style.background="var(--blue-bg)"}
                          onMouseLeave={e=>e.currentTarget.style.background=tpl.level===lv?"var(--paper)":"var(--cream)"}>
                          <div style={{fontSize:13,fontWeight:500,color:"var(--ink)"}}>{tpl.label}</div>
                          <div style={{fontSize:11,color:"var(--ink3)",marginTop:2,fontFamily:"var(--fm)"}}>{tpl.expected}</div>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* Form fields */}
        <div className="field"><label className="lbl">{t.description}</label>
          <input className="inp" value={desc} onChange={e=>setDesc(e.target.value)}
            autoFocus placeholder="Describe the test…"/></div>

        <div className="g2">
          <div className="field"><label className="lbl">{t.equipment}</label>
            <input className="inp" value={equip} onChange={e=>setEquip(e.target.value)}
              placeholder={t.equipmentPh}/></div>
          <div className="field"><label className="lbl">{t.expectedValue}</label>
            <input className="inp" value={exp} onChange={e=>setExp(e.target.value)}/></div>
        </div>

        <div className="g2">
          <div className="field"><label className="lbl">{t.measuredValue}</label>
            <input className="inp" value={meas} onChange={e=>setMeas(e.target.value)} placeholder="PENDING"/></div>
          <div className="field"><label className="lbl">{t.result}</label>
            <div className="rb">{["pass","fail","na","pending"].map(r=>(
              <button key={r} type="button" className={`rbtn ${res===r?`s${r[0]}`:""}`}
                onClick={()=>setRes(r)}>{t[r]}</button>
            ))}</div></div>
        </div>

        {lv===1&&<div className="g2">
          <div className="field"><label className="lbl">Manufacturer</label>
            <input className="inp" value={ex.manufacturer||""} onChange={e=>setEx(x=>({...x,manufacturer:e.target.value}))}/></div>
          <div className="field"><label className="lbl">Serial No.</label>
            <input className="inp" value={ex.serial||""} onChange={e=>setEx(x=>({...x,serial:e.target.value}))}/></div>
        </div>}
        {lv===2&&<div className="g2">
          <div className="field"><label className="lbl">Carrier</label>
            <input className="inp" value={ex.carrier||""} onChange={e=>setEx(x=>({...x,carrier:e.target.value}))}/></div>
          <div className="field"><label className="lbl">Storage Location</label>
            <input className="inp" value={ex.storage||""} onChange={e=>setEx(x=>({...x,storage:e.target.value}))}/></div>
        </div>}
        {lv===5&&<div className="g2">
          <div className="field"><label className="lbl">Scenario</label>
            <input className="inp" value={ex.scenario||""} onChange={e=>setEx(x=>({...x,scenario:e.target.value}))}/></div>
          <div className="field"><label className="lbl">Trigger</label>
            <input className="inp" value={ex.trigger||""} onChange={e=>setEx(x=>({...x,trigger:e.target.value}))}/></div>
        </div>}

        <div className="field">
          <label className="lbl">{t.notes} <span style={{fontWeight:400,opacity:.6}}>({t.notesHint})</span></label>
          <textarea className="inp" rows={2} value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder={t.notesPh} style={{resize:"vertical",lineHeight:1.5}}/>
        </div>

        <div className="modal-foot">
          <button className="btn btn-o" onClick={onClose}>{t.cancel}</button>
          <button className="btn btn-p" onClick={submit} disabled={!desc||busy}>
            {busy?t.saving:t.saveTest}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── DOCUMENTS TAB ─────────────────────────────────────────────────────────────
function DocsTab({project,docs,setDocs,t,lang,user}){
  const [analyzing,setAnalyzing]=useState(null);const ref=useRef();
  async function process(file){
    if(!IS_CONFIGURED){
      // Demo mode: simulate analysis
      const docId="D-"+uid();
      const fakeDoc={id:docId,file_name:file.name,file_type:file.name.split('.').pop(),status:"analyzing",uploaded_at:new Date().toISOString(),extractedValues:[]};
      setDocs(prev=>[fakeDoc,...prev]);setAnalyzing(docId);
      setTimeout(async()=>{
        try{const r=await analyzeDoc(file.name,fakeDoc.file_type,lang);
          setDocs(prev=>prev.map(d=>d.id===docId?{...d,status:"analyzed",extractedValues:r.extractedValues||[],summary:r.summary}:d));
        }catch{setDocs(prev=>prev.map(d=>d.id===docId?{...d,status:"analyzed",extractedValues:[{field:"Voltage",value:"480V 3Φ",confidence:.95,plausibility:"ok",accepted:false}]}:d));}
        setAnalyzing(null);
      },500);
      return;
    }
    try{
      const dbDoc=await DB.uploadDocument(file,project.id,user.id);
      setDocs(prev=>[{...dbDoc,extractedValues:[]},...prev]);
      setAnalyzing(dbDoc.id);
      try{
        const r=await analyzeDoc(file.name,dbDoc.file_type,lang);
        await DB.updateDocumentAnalysis(dbDoc.id,r.summary,r.extractedValues||[],project.id,user.id);
        setDocs(prev=>prev.map(d=>d.id===dbDoc.id?{...d,status:"analyzed",extractedValues:r.extractedValues||[],summary:r.summary}:d));
      }catch{setDocs(prev=>prev.map(d=>d.id===dbDoc.id?{...d,status:"analyzed",extractedValues:[]}:d));}
      setAnalyzing(null);
    }catch(e){console.error(e);}
  }
  const acc=async(docId,i)=>{
    const updated=docs.map(d=>d.id===docId?{...d,extractedValues:d.extractedValues.map((v,j)=>j===i?{...v,accepted:true}:v)}:d);
    setDocs(updated);
    if(IS_CONFIGURED) await DB.updateExtractedValues(docId,updated.find(d=>d.id===docId)?.extractedValues);
  };
  const rej=async(docId,i)=>{
    const updated=docs.map(d=>d.id===docId?{...d,extractedValues:d.extractedValues.map((v,j)=>j===i?{...v,rejected:true,accepted:false}:v)}:d);
    setDocs(updated);
    if(IS_CONFIGURED) await DB.updateExtractedValues(docId,updated.find(d=>d.id===docId)?.extractedValues);
  };
  const accAll=async(docId)=>{
    const updated=docs.map(d=>d.id===docId?{...d,extractedValues:d.extractedValues.map(v=>({...v,accepted:true}))}:d);
    setDocs(updated);
    if(IS_CONFIGURED) await DB.updateExtractedValues(docId,updated.find(d=>d.id===docId)?.extractedValues);
  };
  return(
    <div>
      <div className="drop-z" onClick={()=>ref.current?.click()} onDragOver={e=>e.preventDefault()}
        onDrop={e=>{e.preventDefault();Array.from(e.dataTransfer.files).forEach(process);}}>
        <div style={{fontSize:26,marginBottom:10,opacity:.4}}>📄</div>
        <div style={{fontWeight:500,marginBottom:4}}>{t.dropFiles}</div>
        <div style={{fontSize:12,marginTop:4,color:"var(--ink3)"}}>{t.supportedFormats}</div>
        <input ref={ref} type="file" multiple style={{display:"none"}} accept=".pdf,.xlsx,.csv,.docx,.doc,.dwg" onChange={e=>Array.from(e.target.files).forEach(process)}/>
      </div>
      <div style={{marginTop:20}}>
        {docs.map(doc=>(
          <div key={doc.id} className="doc-card">
            <div className="doc-hd">
              <span className="doc-ext">{doc.file_type||doc.type}</span>
              <span style={{fontWeight:500,flex:1,fontSize:13}}>{doc.file_name||doc.name}</span>
              <span style={{fontSize:11,color:"var(--ink3)",fontFamily:"var(--fm)"}}>{fmtD(doc.uploaded_at||doc.uploadedAt)}</span>
              <Badge type={doc.status==="analyzed"?"analyzed":"analyzing"} label={doc.status==="analyzed"?"Analyzed":"Analyzing…"}/>
              {doc.status==="analyzed"&&<button className="btn btn-g btn-sm" onClick={()=>accAll(doc.id)}>{t.acceptAll}</button>}
            </div>
            {doc.status==="analyzing"||analyzing===doc.id
              ?<div className="ai-sp"><div className="ai-d"/><div className="ai-d"/><div className="ai-d"/><span>{t.analyzing}</span></div>
              :<>
                {doc.summary&&<div style={{fontSize:12,color:"var(--ink2)",padding:"10px 12px",background:"var(--paper)",border:"1px solid var(--rule)",borderRadius:7,marginBottom:10,lineHeight:1.6}}>🤖 {doc.summary}</div>}
                <div style={{fontSize:10,fontWeight:600,color:"var(--ink3)",fontFamily:"var(--fm)",marginBottom:8,textTransform:"uppercase",letterSpacing:".8px"}}>{t.extractedValues}</div>
                {(doc.extractedValues||[]).map((v,i)=>(
                  <div key={i} className="ex-row" style={{opacity:v.rejected?.4:1}}>
                    <span className="ex-f">{v.field}</span>
                    <span className="ex-v">{v.value}</span>
                    <span className="ex-c">{Math.round(v.confidence*100)}%</span>
                    <Badge type={v.plausibility==="ok"?"ok":v.plausibility==="warning"?"warning":"error"} label={v.plausibility==="ok"?"✓":v.plausibility==="warning"?"⚠":"✗"}/>
                    <div style={{display:"flex",gap:4,marginLeft:4}}>
                      {!v.rejected&&<button className={`btn btn-sm ${v.accepted?"btn-g":"btn-p"}`} onClick={()=>acc(doc.id,i)} disabled={v.accepted}>{v.accepted?"✓":t.accept}</button>}
                      {!v.accepted&&!v.rejected&&<button className="btn btn-sm btn-d" onClick={()=>rej(doc.id,i)}>{t.reject}</button>}
                    </div>
                  </div>
                ))}
                {!(doc.extractedValues||[]).length&&<div style={{fontSize:12,color:"var(--ink3)",fontStyle:"italic"}}>No values extracted</div>}
              </>
            }
          </div>
        ))}
        {!docs.length&&<div className="empty" style={{paddingTop:28}}><div className="empty-i">📁</div><p>No documents uploaded yet</p></div>}
      </div>
    </div>
  );
}

function TeamTab({project, user, toast, lang}) {

  const [newEmail, setNewEmail] = useState("");
  const [newRole, setNewRole] = useState("Engineer");

// ── APPROVALS TAB ─────────────────────────────────────────────────────────────
function ApprovalsTab({project, user, tests, lang, toast}) {
  const t = TR[lang];
  const [approvals, setApprovals] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showReq, setShowReq] = useState(false);
  const [reqLevel, setReqLevel] = useState(4);
  const [reqNote, setReqNote] = useState("");
  const [busy, setBusy] = useState(false);

  useEffect(()=>{
    if(!IS_CONFIGURED){setLoading(false);return;}
    DB.getApprovals(project.id).then(setApprovals).catch(console.error).finally(()=>setLoading(false));
  },[project.id]);

  async function requestApproval(){
    setBusy(true);
    try{
      if(IS_CONFIGURED){
        const ap=await DB.createApproval(project.id,user.id,user.email,reqLevel,reqNote);
        setApprovals(prev=>[ap,...prev]);
      }else{
        setApprovals(prev=>[{id:uid(),cx_level:reqLevel,note:reqNote,status:"pending",
          requested_by_email:user.email,created_at:new Date().toISOString()},...prev]);
      }
      toast("Approval request sent — email notification dispatched");
      setShowReq(false);setReqNote("");
    }catch(e){toast("Failed to send approval request",true);}
    setBusy(false);
  }

  async function respond(ap,decision){
    if(!window.confirm(`Mark this approval as ${decision.toUpperCase()}?`)) return;
    try{
      if(IS_CONFIGURED){
        await DB.respondApproval(ap.id,decision,user.email,project.id,user.id);
      }
      setApprovals(prev=>prev.map(a=>a.id===ap.id?{...a,status:decision,responded_by_email:user.email,responded_at:new Date().toISOString()}:a));
      toast(`Approval ${decision} — requester notified by email`);
    }catch(e){toast("Failed to update approval",true);}
  }

  const levelStats = (lvId) => {
    const lvTests = tests.filter(t=>t.level===lvId);
    const pass = lvTests.filter(t=>t.result==="pass").length;
    const total = lvTests.length;
    const allLocked = lvTests.length>0&&lvTests.every(t=>t.locked);
    return {pass,total,allLocked,ready:total>0&&pass===total};
  };

  return(
    <div>
      <div style={{fontFamily:"var(--fh)",fontSize:18,fontWeight:300,marginBottom:4}}>Level Approvals</div>
      <div style={{fontSize:12,color:"var(--ink3)",marginBottom:20,fontFamily:"var(--fm)"}}>
        Multi-step sign-off workflow: Engineer records tests → CxA requests approval → Owner-Rep or Admin approves.
        Email notifications are sent at each step.
      </div>

      {/* Level readiness overview */}
      <div className="card" style={{marginBottom:16}}>
        <div className="c-lbl">Level Readiness</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8}}>
          {CX_LEVELS.map(lv=>{
            const s=levelStats(lv.id);
            const approved=approvals.some(a=>a.cx_level===lv.id&&a.status==="approved");
            const pending=approvals.some(a=>a.cx_level===lv.id&&a.status==="pending");
            return(
              <div key={lv.id} style={{textAlign:"center",padding:"12px 6px",borderRadius:8,
                border:`1px solid ${approved?"rgba(45,122,94,.3)":pending?"rgba(193,123,47,.3)":"var(--rule)"}`,
                background:approved?"var(--green-bg)":pending?"var(--amber-bg)":"var(--cream)"}}>
                <div style={{fontFamily:"var(--fm)",fontSize:9,color:"var(--ink3)",marginBottom:4}}>L{lv.id}</div>
                <div style={{fontFamily:"var(--fh)",fontSize:16,fontWeight:300,lineHeight:1,
                  color:approved?"var(--green)":pending?"var(--amber)":s.total>0?"var(--ink)":"var(--rule2)"}}>
                  {s.total>0?`${s.pass}/${s.total}`:"—"}
                </div>
                <div style={{fontSize:9,fontFamily:"var(--fm)",marginTop:4,
                  color:approved?"var(--green)":pending?"var(--amber)":"var(--ink3)"}}>
                  {approved?"✓ Approved":pending?"⏳ Pending":s.ready?"Ready":"In progress"}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Request approval */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:500,fontSize:14}}>Approval Requests ({approvals.length})</div>
        <button className="btn btn-p btn-sm" onClick={()=>setShowReq(v=>!v)}>
          {showReq?"Cancel":"+ Request Approval"}
        </button>
      </div>

      {showReq&&(
        <div className="card" style={{marginBottom:16,borderColor:"rgba(42,95,165,.25)",background:"var(--blue-bg)"}}>
          <div className="c-lbl">New Approval Request</div>
          <div className="g2">
            <div>
              <label className="lbl">Commissioning Level</label>
              <select className="inp" value={reqLevel} onChange={e=>setReqLevel(Number(e.target.value))}>
                {CX_LEVELS.map(l=>{
                  const s=levelStats(l.id);
                  return<option key={l.id} value={l.id}>
                    L{l.id} – {l.short} ({s.pass}/{s.total} passed{s.allLocked?" · all locked":""})
                  </option>;
                })}
              </select>
            </div>
            <div>
              <label className="lbl">Note to Approver (optional)</label>
              <input className="inp" value={reqNote} onChange={e=>setReqNote(e.target.value)}
                placeholder="All tests complete, ready for review"/>
            </div>
          </div>
          {!levelStats(reqLevel).ready&&(
            <div style={{padding:"8px 12px",background:"var(--amber-bg)",border:"1px solid rgba(193,123,47,.2)",borderRadius:7,fontSize:12,color:"var(--amber)",marginBottom:10}}>
              ⚠ Level L{reqLevel} has outstanding tests. You can still request approval, but the approver will see the current state.
            </div>
          )}
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <button className="btn btn-p btn-sm" onClick={requestApproval} disabled={busy}>
              {busy?"Sending…":"Send Request → Email notification"}
            </button>
          </div>
          <div style={{marginTop:8,fontSize:11,color:"var(--ink3)",fontFamily:"var(--fm)"}}>
            An email will be sent to all Admin and Owner-Rep team members requesting review.
          </div>
        </div>
      )}

      {/* Approval history */}
      {loading?<div style={{color:"var(--ink3)",fontSize:13}}>Loading…</div>:
        approvals.length===0?(
          <div className="empty" style={{paddingTop:28}}>
            <div className="empty-i">📋</div>
            <p>No approval requests yet. When a level is ready, request approval from an Admin or Owner-Rep.</p>
          </div>
        ):
        approvals.map(ap=>(
          <div key={ap.id} className={`approval-card approval-${ap.status}`}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                  <span style={{fontFamily:"var(--fh)",fontSize:16,fontWeight:300}}>
                    Level {ap.cx_level} – {CX_LEVELS.find(l=>l.id===ap.cx_level)?.name||""}
                  </span>
                  <span className={`appr-status appr-${ap.status}`}>{ap.status?.toUpperCase()}</span>
                </div>
                <div style={{fontSize:12,color:"var(--ink2)"}}>{ap.note||<em style={{color:"var(--ink3)"}}>No note</em>}</div>
                <div style={{fontSize:11,color:"var(--ink3)",fontFamily:"var(--fm)",marginTop:6}}>
                  Requested by {ap.requested_by_email} · {fmtTs(ap.created_at)}
                  {ap.responded_by_email&&<> · {ap.status} by {ap.responded_by_email} · {fmtTs(ap.responded_at)}</>}
                </div>
              </div>
              {ap.status==="pending"&&(
                <div style={{display:"flex",gap:8,flexShrink:0}}>
                  <button className="btn btn-sm" style={{background:"var(--green-bg)",borderColor:"rgba(45,122,94,.3)",color:"var(--green)"}}
                    onClick={()=>respond(ap,"approved")}>✓ Approve</button>
                  <button className="btn btn-sm btn-d" onClick={()=>respond(ap,"rejected")}>✗ Reject</button>
                </div>
              )}
            </div>
          </div>
        ))
      }
    </div>
  );
}

const EMPTY_AIR_ROW = () => ({id:uid(),location:"",system:"",designCFM:"",measuredCFM:"",deviation:"",acceptable:""});
const EMPTY_WATER_ROW = () => ({id:uid(),system:"",designGPM:"",measuredGPM:"",designDeltaT:"",measuredDeltaT:"",deviation:"",acceptable:""});

function calcDeviation(design, measured) {
  const d = parseFloat(design), m = parseFloat(measured);
  if(!d||isNaN(d)||isNaN(m)) return "";
  return ((m-d)/d*100).toFixed(1)+"%";
}
function deviationClass(dev) {
  if(!dev) return "";
  const pct = parseFloat(dev);
  if(Math.abs(pct) <= 10) return "pass";
  return "fail";
}

function TABReport({project, lang, user, toast, company={}}){
  const t = TR[lang];
  const storageKey = `tab_${project.id}`;

  const [airRows, setAirRows] = useState([EMPTY_AIR_ROW()]);
  const [waterRows, setWaterRows] = useState([EMPTY_WATER_ROW()]);
  const [tester, setTester] = useState(user.email.split("@")[0]);
  const [testDate, setTestDate] = useState(new Date().toISOString().slice(0,10));
  const [instruments, setInstruments] = useState("");
  const [conditions, setConditions] = useState("");
  const [loaded, setLoaded] = useState(false);

  // Load from Supabase project metadata or localStorage fallback
  useEffect(() => {
    if(!project.id) return;
    try {
      const saved = localStorage.getItem(storageKey);
      if(saved) {
        const d = JSON.parse(saved);
        if(d.airRows?.length) setAirRows(d.airRows);
        if(d.waterRows?.length) setWaterRows(d.waterRows);
        if(d.tester) setTester(d.tester);
        if(d.testDate) setTestDate(d.testDate);
        if(d.instruments) setInstruments(d.instruments);
        if(d.conditions) setConditions(d.conditions);
      }
    } catch(e){}
    setLoaded(true);
  }, [project.id]);

  // Auto-save to localStorage on every change
  useEffect(() => {
    if(!loaded) return;
    try {
      localStorage.setItem(storageKey, JSON.stringify({airRows,waterRows,tester,testDate,instruments,conditions}));
    } catch(e){}
  }, [airRows, waterRows, tester, testDate, instruments, conditions, loaded]);

  function updAir(id, field, val) {
    setAirRows(prev => prev.map(r => {
      if(r.id !== id) return r;
      const updated = {...r, [field]: val};
      if(field === "measuredCFM" || field === "designCFM") {
        const dev = calcDeviation(
          field === "designCFM" ? val : r.designCFM,
          field === "measuredCFM" ? val : r.measuredCFM
        );
        updated.deviation = dev;
        updated.acceptable = dev ? (Math.abs(parseFloat(dev)) <= 10 ? "✓" : "✗") : "";
      }
      return updated;
    }));
  }

  function updWater(id, field, val) {
    setWaterRows(prev => prev.map(r => {
      if(r.id !== id) return r;
      const updated = {...r, [field]: val};
      if(field === "measuredGPM" || field === "designGPM") {
        const dev = calcDeviation(
          field === "designGPM" ? val : r.designGPM,
          field === "measuredGPM" ? val : r.measuredGPM
        );
        updated.deviation = dev;
        updated.acceptable = dev ? (Math.abs(parseFloat(dev)) <= 10 ? "✓" : "✗") : "";
      }
      return updated;
    }));
  }

  const airPass = airRows.filter(r=>r.acceptable==="✓").length;
  const airFail = airRows.filter(r=>r.acceptable==="✗").length;
  const waterPass = waterRows.filter(r=>r.acceptable==="✓").length;
  const waterFail = waterRows.filter(r=>r.acceptable==="✗").length;

// ── PHOTO CELL ────────────────────────────────────────────────────────────────
function PhotoCell({test, setTests, project, user}) {
  const fileRef = useRef();
  const [uploading, setUploading] = useState(false);
  const [lightbox, setLightbox] = useState(null);

  const photos = test.levelData?.photos || test.photos || [];

  async function handleFiles(files) {
    if(test.locked) return;
    setUploading(true);
    for(const file of files) {
      if(!file.type.startsWith('image/')) continue;
      const previewUrl = URL.createObjectURL(file);
      if(!IS_CONFIGURED) {
        // Demo mode: use local object URL
        const fakePhoto = { key: uid(), url: previewUrl, name: file.name, uploadedAt: new Date().toISOString() };
        setTests(prev => prev.map(t => t.id === test.id
          ? { ...t, levelData: { ...(t.levelData||{}), photos: [...photos, fakePhoto] }, photos: [...photos, fakePhoto] }
          : t));
        continue;
      }
      try {
        const { url } = await DB.uploadTestPhoto(file, project.id, test.dbId, user.id);
        setTests(prev => prev.map(t => {
          if(t.id !== test.id) return t;
          const existing = t.levelData?.photos || [];
          const updated = [...existing, { key: uid(), url, name: file.name, uploadedAt: new Date().toISOString() }];
          return { ...t, levelData: { ...(t.levelData||{}), photos: updated }, photos: updated };
        }));
      } catch(e) { console.error('Photo upload failed:', e); }
    }
    setUploading(false);
  }

  async function deletePhoto(photo) {
    if(test.locked) return;
    if(!window.confirm('Remove this photo?')) return;
    if(IS_CONFIGURED && test.dbId) {
      await DB.deleteTestPhoto(test.dbId, photo.key, project.id, user.id);
    }
    setTests(prev => prev.map(t => {
      if(t.id !== test.id) return t;
      const updated = (t.levelData?.photos || []).filter(p => p.key !== photo.key);
      return { ...t, levelData: { ...(t.levelData||{}), photos: updated }, photos: updated };
    }));
  }

  return(
    <div>
      <div className="photo-strip">
        {photos.map((p,i) => (
          <div key={i} className="photo-thumb" onClick={()=>setLightbox(p.url)}>
            <img src={p.url} alt={p.name} loading="lazy"/>
            {!test.locked && (
              <button className="photo-del" onClick={e=>{e.stopPropagation();deletePhoto(p);}}>✕</button>
            )}
          </div>
        ))}
        {!test.locked && (
          <div className="photo-add" onClick={()=>fileRef.current?.click()}
            title="Add photo">
            {uploading ? <div className="spin" style={{width:16,height:16,borderWidth:2}}/> : "+"}
          </div>
        )}
        <input ref={fileRef} type="file" multiple accept="image/*" capture="environment"
          style={{display:"none"}}
          onChange={e=>handleFiles(Array.from(e.target.files))}/>
      </div>

      {lightbox && (
        <div className="photo-modal-ov" onClick={()=>setLightbox(null)}>
          <img className="photo-modal-img" src={lightbox} alt="Test photo" onClick={e=>e.stopPropagation()}/>
        </div>
      )}
    </div>
  );
}

            <th style={{minWidth:90}}>{t.equipment}</th>
            <th>{t.expectedValue}</th><th>{t.measuredValue}</th>
            {extra.map(c=><th key={c.k}>{c.l}</th>)}
            <th>{t.result}</th><th>{t.technician}</th>
            <th style={{minWidth:120}}>{t.notes}</th>
            <th style={{minWidth:80}}>Photos</th>
            <th>Date</th><th></th>
          </tr></thead>
          <tbody>
            {filtered.map(test=>(
              <tr key={test.id}>
                <td><span className="mo">{test.id}</span></td>
                <td><span style={{color:DC[test.discipline]}}>{DI[test.discipline]}</span></td>
                <td style={{fontSize:13,maxWidth:200}}>{test.description}{test.locked&&<span style={{marginLeft:6,fontSize:10,color:"var(--amber)"}}>🔒</span>}</td>
                <td><span className="mo" style={{fontSize:11,color:"var(--blue)"}}>{test.equipment||"—"}</span></td>
                <td><span className="mo">{test.expected}</span></td>
                <td>{test.locked?<span className="mo">{test.measured}</span>
                  :<input className="inp" style={{width:110,padding:"4px 8px",fontSize:12}} defaultValue={test.measured==="PENDING"?"":test.measured}
                      placeholder="PENDING" onBlur={e=>updResult(test.id,test.result,e.target.value||"PENDING")}/>}</td>
                {extra.map(c=><td key={c.k}><span className="mo" style={{fontSize:11}}>{test[c.k]||test.levelData?.[c.k]||"—"}</span></td>)}
                <td>{test.locked?<Badge type={test.result} label={t[test.result]}/>
                  :<div className="rb">{["pass","fail","na"].map(r=><button key={r} className={`rbtn ${test.result===r?`s${r[0]}`:""}`} onClick={()=>updResult(test.id,r,test.measured)}>{t[r]}</button>)}</div>}</td>
                <td style={{fontSize:12,color:"var(--ink2)"}}>{test.technician}</td>
                <td style={{fontSize:12,color:test.notes?"var(--ink2)":"var(--ink3)",fontStyle:test.notes?"normal":"italic",maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{test.notes||"—"}</td>
                <td style={{verticalAlign:"top",paddingTop:8}}>
                  <PhotoCell test={test} setTests={setTests} project={project} user={user}/>
                </td>
                <td><span className="mo" style={{fontSize:11,color:"var(--ink3)"}}>{fmtD(test.ts)}</span></td>
                <td>{!test.locked
                  ?(canSign?<button className="btn btn-g btn-sm" onClick={()=>setSignTarget(test.id)}>🔒</button>
                    :<span style={{fontSize:11,color:"var(--ink3)"}}>—</span>)
                  :<div>
                    <span style={{fontSize:11,color:"var(--green)"}}>✓ {test.signature}</span>
                    {test.witness&&<div style={{fontSize:10,color:"var(--ink3)",marginTop:2,fontFamily:"var(--fm)"}}>
                      Witness: {test.witness}
                    </div>}
                  </div>
                }</td>
              </tr>
            ))}
            {!filtered.length&&<tr><td colSpan={10+extra.length} style={{textAlign:"center",padding:"32px 0",color:"var(--ink3)",fontStyle:"italic",fontSize:13}}>No tests recorded for this level yet</td></tr>}
          </tbody>
        </table>
      </div>
      {showAdd&&<AddTestModal project={project} onAdd={addTest} onClose={()=>setShowAdd(false)} t={t} user={user} defLevel={level}/>}
      {signTarget&&<SignModal testId={signTarget} onSign={(sig,w)=>lockTest(signTarget,sig,w)} onClose={()=>setSignTarget(null)} t={t} user={user}/>}
    </div>
  );
}

// ── PDF EXPORT ────────────────────────────────────────────────────────────────
function exportPDF(project, tests, punchItems, documents, user, lang, company={}) {
  const t = TR[lang];
  const fmtR = r => r==="pass"?"PASS":r==="fail"?"FAIL":r==="na"?"N/A":"OPEN";
  const fmtRColor = r => r==="pass"?"#2D7A5E":r==="fail"?"#B84040":r==="na"?"#8896A8":"#C17B2F";
  const genId = `CIQ-${project.project_number||project.id?.slice(0,8)}-${Date.now().toString(36).toUpperCase()}`;
  const verifyUrl = `${SUPABASE_URL}/verify/${genId}`;
  const now = new Date();

  // QR code via Google Charts API (no external lib needed)
  const qr = `https://chart.googleapis.com/chart?cht=qr&chs=80x80&chl=${encodeURIComponent(verifyUrl)}&choe=UTF-8`;

  const passCount = tests.filter(t=>t.result==="pass").length;
  const failCount = tests.filter(t=>t.result==="fail").length;
  const pendCount = tests.filter(t=>t.result==="pending").length;
  const openPunch = punchItems.filter(i=>i.status==="open").length;

  // Group tests by level
  const byLevel = CX_LEVELS.map(lv=>({
    ...lv,
    tests: tests.filter(t=>t.level===lv.id)
  })).filter(lv=>lv.tests.length>0);

  const disciplineLabel = {electrical:"Electrical",mechanical:"Mechanical",fireSuppression:"Fire Suppression",itInfra:"IT Infrastructure"};
  const disciplineColor = DC;

  // Company header block
  const companyHeader = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px">

        ${company.logo?`<img src="${company.logo}" style="height:52px;max-width:140px;object-fit:contain" alt="Logo"/>`:""}
        <div>
          ${company.name?`<div style="font-size:13pt;font-weight:600;color:var(--slate)">${company.name}</div>`:""}
          ${company.tagline?`<div style="font-size:8.5pt;color:var(--ink3);margin-top:1px">${company.tagline}</div>`:""}
          ${company.cert?`<div style="font-size:7.5pt;color:var(--blue);margin-top:3px;font-family:'Instrument Mono',monospace">${company.cert}</div>`:""}
          ${!company.name&&!company.logo?`<div style="font-family:'Fraunces',Georgia,serif;font-size:18pt;font-weight:400;color:var(--slate)">Commission<em>IQ</em></div>`:""}
        </div>
      </div>
      <div style="text-align:right;font-family:'Instrument Mono',monospace;font-size:7.5pt;color:var(--ink3);line-height:1.8">
        ${company.address?`<div>${company.address}</div>`:""}
        ${company.phone?`<div>${company.phone}</div>`:""}
        ${company.email?`<div>${company.email}</div>`:""}
        ${company.website?`<div>${company.website}</div>`:""}
      </div>
    </div>`;

  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cx Report – ${project.name}</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=Instrument+Sans:wght@400;500;600&family=Instrument+Mono&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--slate:#1C2B3A;--ink:#1A1F2E;--ink2:#4A5568;--ink3:#8896A8;--rule:#DDD8CE;--rule2:#C8C2B4;--green:#2D7A5E;--red:#B84040;--amber:#C17B2F;--blue:#2A5FA5}
  body{font-family:'Instrument Sans',Arial,sans-serif;font-size:10pt;color:var(--ink);background:#fff;line-height:1.5}
  @page{size:Letter;margin:18mm 15mm 18mm 15mm}
  @media print{.no-print{display:none!important}.page-break{page-break-before:always}}
  .doc-header{padding-bottom:14px;border-bottom:2px solid var(--slate);margin-bottom:16px}
  .doc-title{font-size:13pt;font-family:'Fraunces',Georgia,serif;font-weight:300;margin-top:10px;color:var(--ink)}
  .doc-meta{font-size:8pt;color:var(--ink3);font-family:'Instrument Mono',monospace;margin-top:2px}
  .qr-block{text-align:right;flex-shrink:0}
  .qr-block img{width:72px;height:72px}
  .qr-id{font-family:'Instrument Mono',monospace;font-size:7pt;color:var(--ink3);margin-top:3px}
  .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
  .sum-card{border:1px solid var(--rule2);border-radius:6px;padding:10px 12px}

  .sum-l{font-size:8pt;color:var(--ink3);font-family:'Instrument Mono',monospace;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
  .std-bar{background:#EDF7F3;border:1px solid rgba(45,122,94,.2);border-radius:6px;padding:8px 12px;margin-bottom:20px;font-size:8pt;color:var(--green);font-family:'Instrument Mono',monospace;display:flex;gap:16px;flex-wrap:wrap}
  .sec-head{font-family:'Fraunces',Georgia,serif;font-size:13pt;font-weight:300;color:var(--slate);margin:20px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;align-items:baseline}

  .print-btn:hover{background:#2D4255}
</style>
</head>
<body>

<!-- HEADER -->
