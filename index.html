  );
}

// ── PROJECT STATE HOOK ────────────────────────────────────────────────────────
function useProjectState(projectId,user){
  const [tests,setTests]=useState([]);
  const [punchItems,setPunchItems]=useState([]);
  const [documents,setDocuments]=useState([]);
  const [auditLog,setAuditLog]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    if(!projectId)return;
    setLoading(true);
    Promise.all([
      DB.getTests(projectId),
      DB.getPunchItems(projectId),
      DB.getDocuments(projectId),
      DB.getAuditLog(projectId),
    ]).then(([t,p,d,a])=>{
      setTests(t.map(row=>({
        id:row.test_number||row.id, dbId:row.id, level:row.cx_level,
        discipline:row.discipline, equipment:row.equipment_id, description:row.description,
        expected:row.expected_value, measured:row.measured_value, result:row.result,
        notes:row.observations, technician:row.technician_name,
        ts:row.tested_at||row.created_at, locked:row.is_locked,
        signature:row.signature_name,
        witness:row.witness_signature||'',
        witnessSigned:row.witness_signed_at||'',
        lockedAt:row.locked_at||'',
        levelData:row.level_data||{},
        photos:row.level_data?.photos||[],
      })));
      setPunchItems(p.map(row=>({
        id:row.item_number||row.id,dbId:row.id,description:row.description,
        severity:row.severity,assignedTo:row.assigned_to_name,due:row.due_date,status:row.status,
      })));
      setDocuments(d);
      setAuditLog(a);
    }).catch(console.error).finally(()=>setLoading(false));
  },[projectId]);

  return {tests,setTests,punchItems,setPunchItems,documents,setDocuments,auditLog,setAuditLog,loading};
}

            <input className="inp" type="date" value={row.submitted_date} onChange={e=>f("submitted_date",e.target.value)}/></div>
          <div className="field"><label className="lbl">Required Return Date</label>
            <input className="inp" type="date" value={row.required_date} onChange={e=>f("required_date",e.target.value)}/></div>
          <div className="field"><label className="lbl">Returned Date</label>
            <input className="inp" type="date" value={row.returned_date} onChange={e=>f("returned_date",e.target.value)}/></div>
        </div>
        <div className="g2">
          <div className="field"><label className="lbl">Status</label>
            <select className="inp" value={row.status} onChange={e=>f("status",e.target.value)}>
              {SUBMITTAL_STATUSES.map(s=><option key={s} value={s}>{SUBMITTAL_STATUS_LABELS[s]}</option>)}
            </select></div>
          <div className="field"><label className="lbl">Notes</label>
            <input className="inp" value={row.notes} onChange={e=>f("notes",e.target.value)} placeholder="Reviewer comments, deviations…"/></div>
        </div>
        <div className="modal-foot">
          {onDelete&&<button className="btn btn-d btn-sm" onClick={onDelete}>Delete</button>}
          <div style={{flex:1}}/>
          <button className="btn btn-o" onClick={onClose}>{t.cancel}</button>
          <button className="btn btn-p" onClick={()=>onSave(row)} disabled={!row.description}>Save</button>
        </div>
      </div>
    </div>
  );
}

// ── PRE-INSTALLATION MEETING LOG ──────────────────────────────────────────────
const EMPTY_MEETING = ()=>({
  id:uid(), date:new Date().toISOString().slice(0,10),
  type:"pre_install", title:"", location:"", facilitator:"",
  attendees:"", agenda:"", decisions:"", action_items:"", next_meeting:""
});
const MEETING_TYPES = {
  pre_install:"Pre-Installation",pre_construction:"Pre-Construction",
  cx_kickoff:"Cx Kickoff",progress:"Progress Meeting",
  coordination:"Coordination",closeout:"Closeout"
};

function MeetingLog({project, lang, user, toast}) {
  const t = TR[lang];
  const key = `mtg_${project.id}`;
  const [meetings, setMeetings] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [editId, setEditId] = useState(null);
  const [expanded, setExpanded] = useState(null);

  useEffect(()=>{
    try{ const s=JSON.parse(localStorage.getItem(key)||'[]'); if(s.length) setMeetings(s); }catch{}
    setLoaded(true);
  },[project.id]);

  useEffect(()=>{
    if(!loaded) return;
    try{ localStorage.setItem(key, JSON.stringify(meetings)); }catch{}
  },[meetings, loaded]);

  function save(m){ setMeetings(p=>p.some(x=>x.id===m.id)?p.map(x=>x.id===m.id?m:x):[m,...p].sort((a,b)=>b.date.localeCompare(a.date))); }

  return(
    <div>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:"var(--fh)",fontSize:18,fontWeight:300}}>Meeting Protocols</div>
          <div style={{fontSize:12,color:"var(--ink3)",marginTop:3,fontFamily:"var(--fm)"}}>
            Pre-installation · Pre-construction · Coordination meetings · {meetings.length} recorded
          </div>
        </div>
        <button className="btn btn-p btn-sm" onClick={()=>{setEditId(null);setShowAdd(true);}}>+ New Meeting</button>
      </div>

      {meetings.length===0&&(
        <div className="empty"><div className="empty-i">📝</div>
          <p>No meetings recorded yet.<br/>Document your pre-installation and coordination meetings here.</p></div>
      )}

      {meetings.map(m=>(
        <div key={m.id} className="card" style={{marginBottom:12,cursor:"pointer"}}
          onClick={()=>setExpanded(expanded===m.id?null:m.id)}>
          <div style={{display:"flex",alignItems:"flex-start",gap:14,flexWrap:"wrap"}}>
            <div style={{width:56,height:56,borderRadius:8,background:"var(--slate)",color:"#fff",
              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
              fontFamily:"var(--fm)",flexShrink:0}}>
              <div style={{fontSize:16,fontWeight:600,lineHeight:1}}>{new Date(m.date).getDate()}</div>
              <div style={{fontSize:9,opacity:.6}}>{new Date(m.date).toLocaleString('en',{month:'short',year:'2-digit'})}</div>
            </div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:3,flexWrap:"wrap"}}>
                <span style={{fontWeight:500,fontSize:14}}>{m.title||"Untitled Meeting"}</span>
                <span style={{fontFamily:"var(--fm)",fontSize:10,padding:"2px 7px",borderRadius:4,
                  background:"var(--blue-bg)",color:"var(--blue)",border:"1px solid rgba(42,95,165,.2)"}}>
                  {MEETING_TYPES[m.type]||m.type}
                </span>
              </div>
              <div style={{fontSize:12,color:"var(--ink3)"}}>
                {m.location&&<span>{m.location} · </span>}
                {m.facilitator&&<span>Facilitated by {m.facilitator} · </span>}
                {m.attendees&&<span>{m.attendees.split(",").length} attendee{m.attendees.split(",").length!==1?"s":""}</span>}
              </div>
              {m.decisions&&<div style={{fontSize:12,color:"var(--ink2)",marginTop:4,lineHeight:1.5}}>
                <span style={{fontWeight:600,marginRight:4}}>Key decisions:</span>
                {m.decisions.length>120?m.decisions.slice(0,120)+"…":m.decisions}
              </div>}
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0}}>
              <button className="btn btn-g btn-sm" onClick={e=>{e.stopPropagation();setEditId(m.id);setShowAdd(true);}}>Edit</button>
              <span style={{fontSize:12,color:"var(--ink3)",alignSelf:"center"}}>{expanded===m.id?"▲":"▼"}</span>
            </div>
          </div>

          {expanded===m.id&&(
            <div style={{marginTop:16,paddingTop:16,borderTop:"1px solid var(--rule)"}} onClick={e=>e.stopPropagation()}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                {[
                  {l:"Agenda / Topics",v:m.agenda},
                  {l:"Decisions & Outcomes",v:m.decisions},
                  {l:"Action Items",v:m.action_items},
                  {l:"Next Meeting",v:m.next_meeting},
                ].map(({l,v})=>v?(
                  <div key={l}>
                    <div style={{fontSize:10,fontFamily:"var(--fm)",color:"var(--ink3)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:4,fontWeight:600}}>{l}</div>
                    <div style={{fontSize:13,color:"var(--ink2)",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{v}</div>
                  </div>
                ):null)}
              </div>
              {m.attendees&&(
                <div style={{marginTop:12}}>
                  <div style={{fontSize:10,fontFamily:"var(--fm)",color:"var(--ink3)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:6,fontWeight:600}}>Attendees</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {m.attendees.split(",").map((a,i)=>(
                      <span key={i} style={{padding:"3px 10px",background:"var(--cream)",border:"1px solid var(--rule2)",
                        borderRadius:20,fontSize:12,color:"var(--ink2)"}}>{a.trim()}</span>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      ))}

      {showAdd&&<MeetingModal
        initial={editId?meetings.find(m=>m.id===editId):EMPTY_MEETING()}
        onSave={m=>{save(m);setShowAdd(false);toast(editId?"Meeting updated":"Meeting recorded");}}
        onDelete={editId?()=>{setMeetings(p=>p.filter(m=>m.id!==editId));setShowAdd(false);toast("Meeting removed");}:null}
        onClose={()=>setShowAdd(false)} user={user}/>}
    </div>
  );
}

        <div className="g2">

// ── COMPANY SETTINGS ─────────────────────────────────────────────────────────
function CompanySettings({company, setCompany, toast}) {
  const [name,    setName]    = useState(company.name||"");
  const [tagline, setTagline] = useState(company.tagline||"");
  const [address, setAddress] = useState(company.address||"");
  const [phone,   setPhone]   = useState(company.phone||"");
  const [email,   setEmail]   = useState(company.email||"");
  const [website, setWebsite] = useState(company.website||"");
  const [cert,    setCert]    = useState(company.cert||"");
  const [logo,    setLogo]    = useState(company.logo||"");  // base64 data URL
  const [saved,   setSaved]   = useState(false);
  const fileRef = useRef();

  function handleLogo(file) {
    if(!file||!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => setLogo(e.target.result);
    reader.readAsDataURL(file);
  }

  function save() {
    setCompany({name,tagline,address,phone,email,website,cert,logo});
    setSaved(true);
    toast("Company profile saved — appears in all PDF exports");
    setTimeout(()=>setSaved(false),2000);
  }

  return(
    <div style={{maxWidth:680}}>
      <div style={{fontFamily:"var(--fh)",fontSize:22,fontWeight:300,letterSpacing:"-.2px",marginBottom:4}}>
        Company Profile
      </div>
      <div style={{fontSize:13,color:"var(--ink3)",marginBottom:28}}>
        Your company details and logo appear on every PDF export — commissioning reports and TAB reports.
      </div>

      {/* Logo upload */}
      <div className="card" style={{marginBottom:16}}>
        <div className="c-lbl">Company Logo</div>
        <div style={{display:"flex",alignItems:"flex-start",gap:20,flexWrap:"wrap"}}>
          <div style={{width:140,height:80,border:`2px dashed ${logo?"var(--green)":"var(--rule2)"}`,borderRadius:10,
            display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",
            background:logo?"var(--green-bg)":"var(--cream)",flexShrink:0,cursor:"pointer"}}
            onClick={()=>fileRef.current?.click()}
            onDragOver={e=>e.preventDefault()}
            onDrop={e=>{e.preventDefault();handleLogo(e.dataTransfer.files[0]);}}>
            {logo
              ?<img src={logo} style={{maxWidth:130,maxHeight:72,objectFit:"contain"}} alt="Logo"/>
              :<div style={{textAlign:"center",color:"var(--ink3)",fontSize:12}}>
                <div style={{fontSize:22,marginBottom:4,opacity:.4}}>🏢</div>
                Click or drop
              </div>}
          </div>
          <div style={{flex:1}}>
            <button className="btn btn-o btn-sm" onClick={()=>fileRef.current?.click()}>
              {logo?"Replace logo":"Upload logo"}
            </button>
            {logo&&<button className="btn btn-g btn-sm" style={{marginLeft:8,color:"var(--red)"}} onClick={()=>setLogo("")}>Remove</button>}
            <div style={{fontSize:11,color:"var(--ink3)",marginTop:8,lineHeight:1.6}}>
              PNG or JPG, max 1 MB. Recommended: white or transparent background, min 400×100px.<br/>
              Appears in top-left of every PDF report.
            </div>
            <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}}
              onChange={e=>handleLogo(e.target.files[0])}/>
          </div>
        </div>
      </div>

      {/* Company details */}
      <div className="card" style={{marginBottom:16}}>
        <div className="c-lbl">Company Details</div>
        <div className="g2">
          <div className="field">
            <label className="lbl">Company Name</label>
            <input className="inp" value={name} onChange={e=>setName(e.target.value)} placeholder="Your Company Inc."/>
          </div>
          <div className="field">
            <label className="lbl">Tagline / Specialty</label>
            <input className="inp" value={tagline} onChange={e=>setTagline(e.target.value)} placeholder="Datacenter Commissioning Authority"/>
          </div>
        </div>
        <div className="field">
          <label className="lbl">Address</label>
          <input className="inp" value={address} onChange={e=>setAddress(e.target.value)} placeholder="123 Main St, Atlanta, GA 30301"/>
        </div>
        <div className="g2">
          <div className="field">
            <label className="lbl">Phone</label>
            <input className="inp" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+1 (404) 555-0100"/>
          </div>
          <div className="field">
            <label className="lbl">Email</label>
            <input className="inp" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="cx@yourcompany.com"/>
          </div>
        </div>
        <div className="g2">
          <div className="field">
            <label className="lbl">Website</label>
            <input className="inp" value={website} onChange={e=>setWebsite(e.target.value)} placeholder="www.yourcompany.com"/>
          </div>
          <div className="field">
            <label className="lbl">Certifications / Credentials</label>
            <input className="inp" value={cert} onChange={e=>setCert(e.target.value)} placeholder="NEBB Certified · ASHRAE Member · PE"/>
          </div>
        </div>
      </div>

      {/* Preview */}
      {(name||logo)&&(
        <div className="card" style={{marginBottom:16,borderColor:"rgba(42,95,165,.2)",background:"var(--blue-bg)"}}>
          <div className="c-lbl">PDF Header Preview</div>
          <div style={{background:"#fff",border:"1px solid var(--rule)",borderRadius:8,padding:"16px 20px",
            display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:16}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:16}}>
              {logo&&<img src={logo} style={{height:44,maxWidth:120,objectFit:"contain"}} alt="Logo"/>}
              <div>
                {name&&<div style={{fontWeight:600,fontSize:14,color:"#1C2B3A"}}>{name}</div>}
                {tagline&&<div style={{fontSize:11,color:"#8896A8",marginTop:1}}>{tagline}</div>}
                {cert&&<div style={{fontSize:10,color:"#2A5FA5",marginTop:3,fontFamily:"monospace"}}>{cert}</div>}
              </div>
            </div>
            <div style={{fontSize:10,color:"#8896A8",textAlign:"right",lineHeight:1.7,fontFamily:"monospace"}}>
              {address&&<div>{address}</div>}
              {phone&&<div>{phone}</div>}
              {email&&<div>{email}</div>}
              {website&&<div>{website}</div>}
            </div>
          </div>
          <div style={{fontSize:11,color:"var(--ink3)",marginTop:8,fontFamily:"var(--fm)"}}>
            This is exactly how your company header will appear on exported PDFs.
          </div>
        </div>
      )}

      <button className="btn btn-p" onClick={save} style={{minWidth:160,justifyContent:"center"}}>
        {saved?"✓ Saved":"Save company profile"}
      </button>
    </div>
  );
}

function App(){
  const [lang,setLang]=useState("de");
  const t=TR[lang];
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(IS_CONFIGURED);
  const [view,setView]=useState("dashboard");
  const [projects,setProjects]=useState([]);
  const [projectsLoading,setProjectsLoading]=useState(false);
  const [activeId,setActiveId]=useState(null);
  const [showCreate,setShowCreate]=useState(false);
  const [createBusy,setCreateBusy]=useState(false);
  const [toastMsg,setToastMsg]=useState(null);
  const [toastErr,setToastErr]=useState(false);
  const timer=useRef(null);
  // Company profile – loaded from localStorage, available app-wide
  const [company,setCompany]=useState(()=>DB.getCompany());

  // Check Supabase session on load
  useEffect(()=>{
    if(!IS_CONFIGURED){setAuthLoading(false);return;}
    sb.auth.getSession().then(({data:{session}})=>{
      if(session){setUser({id:session.user.id,email:session.user.email,role:'Admin'});}
      setAuthLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      if(session){setUser({id:session.user.id,email:session.user.email,role:'Admin'});}
      else setUser(null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  // Load projects when user is set
  useEffect(()=>{
    if(!user)return;
    setProjectsLoading(true);
    DB.getProjects(user.id).then(setProjects).catch(console.error).finally(()=>setProjectsLoading(false));
  },[user]);

  function showToast(m,isErr=false){
    setToastMsg(m);setToastErr(isErr);
    clearTimeout(timer.current);
    timer.current=setTimeout(()=>setToastMsg(null),3000);
  }

  async function handleLogout(){
    if(IS_CONFIGURED) await sb.auth.signOut();
    setUser(null);setView("dashboard");setActiveId(null);setProjects([]);
  }

  async function createProject(data){
    setCreateBusy(true);
    try{
      if(!IS_CONFIGURED){
        // Demo mode
        const p={id:uid(),project_number:`P-${new Date().getFullYear()}-${String(projects.length+1).padStart(3,"0")}`,
          ...data,uptime_tier:data.tier,status:"planned",_tests:[],_punch:[],_docs:[]};
        setProjects(prev=>[p,...prev]);
        setActiveId(p.id);setView("detail");setShowCreate(false);
        showToast("Project created");
      }else{
        const p=await DB.createProject(data,user.id);
        setProjects(prev=>[p,...prev]);
        setActiveId(p.id);setView("detail");setShowCreate(false);
        showToast("Project created");
      }
    }catch(e){showToast("Failed to create project",true);}
    setCreateBusy(false);
  }

  const active=projects.find(p=>p.id===activeId);

  if(authLoading) return <div className="loading-screen"><div className="spin"/><div style={{fontSize:13,fontFamily:"var(--fm)"}}>CommissionIQ</div></div>;
  if(!user) return <Login onLogin={setUser} t={t} lang={lang} setLang={setLang}/>;

  const navItems=[
    {k:"dashboard",l:t.dashboard,icon:<svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>},
    {k:"projects",l:t.projects,icon:<svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 3h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>},
    {k:"settings",l:"Settings",icon:<svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>},
  ];

  return(
    <div className="shell">
      <nav className="sidebar">
        <div className="sb-head">
          <div className="sb-logo">Commission<em>IQ</em></div>
          <div className="sb-tag">DATACENTER · USA</div>
        </div>
        <div className="sb-sec">Navigation</div>
        {navItems.map(({k,l,icon})=>(
          <div key={k} className={`sb-item ${view===k?"active":""}`} onClick={()=>{setView(k);setActiveId(null);}}>
            <span style={{width:16,display:"flex",alignItems:"center",opacity:.7}}>{icon}</span>{l}
          </div>
        ))}
        <div className="sb-sec">Standards</div>
        {["ASHRAE GL-0","ASHRAE 202","NFPA 70E","NEC 2023","Uptime Tier I–IV","LEED v4","NEBB"].map(s=>(
          <div key={s} className="sb-chip"><div className="sb-dot"/>{s}</div>
        ))}
        {!IS_CONFIGURED&&(
          <div style={{margin:"8px 20px",padding:"8px 10px",background:"rgba(193,123,47,.1)",border:"1px solid rgba(193,123,47,.25)",borderRadius:6,fontSize:10,color:"rgba(193,123,47,.9)",fontFamily:"var(--fm)"}}>
            DEMO MODE · data not saved
          </div>
        )}
        <div className="sb-foot">
          <div className="user-row">
            <div className="u-av">{user.email[0].toUpperCase()}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="u-name">{user.email}</div>
              <div className="u-role">Admin · {IS_CONFIGURED?"2MFA active":"Demo mode"}</div>
            </div>
          </div>
          <div className="sb-item" onClick={handleLogout}>
            <span style={{width:16,display:"flex",alignItems:"center",opacity:.5}}>
              <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/></svg>
            </span>{t.logout}
          </div>
        </div>
      </nav>

      <div className="main">
        <div className="topbar">
          <div style={{display:"flex",alignItems:"center"}}>
            <div className="tb-title">
              {view==="dashboard"&&t.dashboard}
              {view==="projects"&&t.projects}
              {view==="settings"&&"Settings"}
              {view==="detail"&&<span style={{fontStyle:"italic",fontWeight:300}}>{active?.name}</span>}
            </div>
            {view==="detail"&&active&&<div className="tb-sub">{active.project_number||""} · {active.client}</div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button className="btn btn-g btn-sm" onClick={()=>setLang(l=>l==="en"?"de":"en")}>{t.lang}</button>
            {(view==="dashboard"||view==="projects")&&<button className="btn btn-p btn-sm" onClick={()=>setShowCreate(true)}>+ {t.newProject}</button>}
          </div>
        </div>

        <div className="content">
          {view==="dashboard"&&(
            projectsLoading?<div className="loading-screen" style={{height:"auto",padding:"60px 0"}}><div className="spin"/></div>
            :<Dashboard projects={projects} onOpen={id=>{setActiveId(id);setView("detail");}} onCreate={()=>setShowCreate(true)} t={t}/>
          )}
          {view==="projects"&&(
            <div>
              <div className="sh"><div className="st">{t.projects}</div></div>
              <div className="card">
                {projects.map(p=>{const prog=calcProg(p._tests||[]);return(
                  <div key={p.id} className="proj-row" onClick={()=>{setActiveId(p.id);setView("detail");}}>
                    <div className="pid">{p.project_number||p.id?.slice(0,8)}</div>
                    <div style={{flex:2}}><div style={{fontWeight:500}}>{p.name}</div>
                      <div style={{fontSize:12,color:"var(--ink3)",marginTop:1}}>{p.client} · {p.location}</div></div>
                    {p.uptime_tier&&<span style={{fontFamily:"var(--fm)",fontSize:10,padding:"2px 7px",border:"1px solid var(--rule2)",borderRadius:4,color:"var(--ink3)",flexShrink:0}}>Tier {p.uptime_tier}</span>}
                    <div className="dds">{(p.disciplines||[]).map(d=><div key={d} className="dd" style={{background:DC[d]}}/>)}</div>
                    <Badge type={p.status} label={t[p.status]||p.status}/>
                    <div style={{display:"flex",alignItems:"center",gap:8}}><PBar v={prog}/><span style={{fontSize:11,color:"var(--ink3)"}}>{prog}%</span></div>
                  </div>
                );})}
                {!projects.length&&<div className="empty"><div className="empty-i">📋</div><p>{t.noProjects}</p></div>}
              </div>
            </div>
          )}
          {view==="detail"&&active&&(
            <ProjectDetail project={active} onBack={()=>setView("projects")} t={t} user={user} lang={lang} toast={showToast} company={company}/>
          )}
          {view==="settings"&&(
            <CompanySettings company={company} setCompany={c=>{setCompany(c);DB.saveCompany(c);}} toast={showToast}/>
          )}
        </div>
      </div>

      {showCreate&&<CreateModal onClose={()=>setShowCreate(false)} onCreate={createProject} t={t} busy={createBusy}/>}
      {toastMsg&&<Toast msg={toastMsg} isErr={toastErr}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
